<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:    #F4EEE1;
    --bg2:   #EDE5D3;
    --card:  #FBF7EE;
    --ink:   #1E2A2E;
    --muted: #4A5A5C;
    --line:  #D8CDB6;
    --teal:  #2E6E6A;
    --teal-deep: #215A57;
    --ochre: #C98A2B;
    --ochre-deep: #8A5A12;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(1100px 560px at 84% -10%, rgba(46,110,106,0.10), transparent 60%),
      radial-gradient(820px 480px at 4% 6%, rgba(201,138,43,0.09), transparent 58%),
      linear-gradient(180deg, #EDE5D3 0%, #F4EEE1 78%);
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* the route: a winding dashed path with numbered waypoints */
  .route { position: absolute; inset: 0; width: 1200px; height: 630px; }
  .route .path {
    fill: none; stroke: var(--teal); stroke-width: 3;
    stroke-linecap: round; stroke-dasharray: 3 16; opacity: 0.5;
  }
  .wp circle { fill: var(--bg); stroke: var(--ochre); stroke-width: 3.4; }
  .wp circle.fill { fill: var(--ochre); }
  .wp text {
    fill: var(--ochre-deep); font-family: var(--mono);
    font-size: 22px; font-weight: 700; text-anchor: middle; dominant-baseline: central;
  }

  .frame {
    position: absolute; inset: 0;
    padding: 82px 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  .brand { display: flex; align-items: center; gap: 22px; }
  .mark {
    width: 82px; height: 82px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--line);
    box-shadow: 0 16px 40px -22px rgba(30,42,46,0.5);
  }
  .wordmark {
    font-size: 64px; font-weight: 800; letter-spacing: -0.035em;
    line-height: 1; color: var(--ink);
  }

  .headline { max-width: 940px; }
  .headline h1 {
    font-size: 62px; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1.08; color: var(--ink);
  }
  .headline .accent { color: var(--teal-deep); }
  .headline p {
    margin-top: 22px;
    font-size: 29px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--muted); line-height: 1.35; max-width: 32ch;
  }

  .chips { display: flex; align-items: center; gap: 13px; }
  .chip {
    display: inline-flex; align-items: center; gap: 11px;
    padding: 12px 20px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--muted);
  }
  .chip .dot { width: 11px; height: 11px; border-radius: 50%; }
  .chip .dot--teal { background: var(--teal); box-shadow: 0 0 0 4px rgba(46,110,106,0.14); }
  .chip .dot--ochre { background: var(--ochre); box-shadow: 0 0 0 4px rgba(201,138,43,0.16); }
</style>
</head>
<body>
  <svg class="route" viewBox="0 0 1200 630" preserveAspectRatio="none" aria-hidden="true">
    <path class="path" d="M-20 470 C 160 470, 220 300, 380 300 S 600 470, 760 400 S 1010 250, 1220 300"/>
    <g class="wp">
      <circle cx="120" cy="452" r="26"/><text x="120" y="453">1</text>
    </g>
    <g class="wp">
      <circle class="fill" cx="380" cy="300" r="26"/><text x="380" y="301" fill="#1E2A2E">2</text>
    </g>
    <g class="wp">
      <circle cx="700" cy="430" r="26"/><text x="700" y="431">3</text>
    </g>
    <g class="wp">
      <circle class="fill" cx="1000" cy="262" r="26"/><text x="1000" y="263" fill="#1E2A2E">4</text>
    </g>
  </svg>

  <div class="frame">
    <div class="brand">
      <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" rx="7" fill="#FBF7EE"/>
        <path d="M6 22c3-1 4-9 8-9s5 8 8 6" fill="none" stroke="#2E6E6A" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="1 4.2"/>
        <circle cx="6" cy="22" r="3.1" fill="#2E6E6A"/>
        <circle cx="14" cy="13" r="3.1" fill="#FBF7EE" stroke="#C98A2B" stroke-width="2.2"/>
        <circle cx="22" cy="19" r="3.1" fill="#C98A2B"/>
      </svg>
      <span class="wordmark">codetour</span>
    </div>

    <div class="headline">
      <h1>Turn code into a<br><span class="accent">guided walkthrough.</span></h1>
      <p>Paste your code. codetour finds the landmarks; you write the tour.</p>
    </div>

    <div class="chips">
      <span class="chip"><span class="dot dot--teal"></span>JS · TS · Python · Go</span>
      <span class="chip"><span class="dot dot--ochre"></span>annotate &amp; export</span>
      <span class="chip"><span class="dot dot--teal"></span>offline · no AI</span>
    </div>
  </div>
</body>
</html>
